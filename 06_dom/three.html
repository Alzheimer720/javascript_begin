<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: black; color: white;">
    
</body>
<script>
    // how to create a new element process
    const div=document.createElement('div');
    console.log(div);
    div.className="main";
    div.id=Math.round(Math.random()*10);
    div.setAttribute("title","generated title");
    div.style.backgroundColor="green"
    div.style.padding="15px"
    // div.innerText="Anant Sharma" -> ye use ni krte kyuki ye already existing text ko 
    // overwrite krta hai which is not a good practice
    // instead we use this
   const text= document.createTextNode("Anant Sharma")
   div.appendChild(text);
   document.body.appendChild(div);
</script>
</html>
